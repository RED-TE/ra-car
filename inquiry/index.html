<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RE:CAR 장기렌트·리스 간편 상담. 차종, 이름, 연락처만 입력하면 가능한 조건을 빠르게 안내합니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RE:CAR" />
    <meta property="og:url" content="https://recarplan.com/inquiry/" />
    <meta property="og:title" content="RE:CAR 간편 견적 상담" />
    <meta property="og:description" content="차종, 이름, 연락처만 남기면 장기렌트·리스 조건을 비교해드립니다." />
    <meta property="og:image" content="https://recarplan.com/assets/recar-og-20260518.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://recarplan.com/inquiry/" />
    <title>RE:CAR 간편 견적 상담</title>
    <link rel="icon" type="image/png" href="../assets/recar-favicon-20260518.png" />
    <link rel="apple-touch-icon" href="../assets/recar-favicon-20260518.png" />
    <link rel="stylesheet" href="../styles.css?v=20260518-admincrm" />
  </head>
  <body class="simple-inquiry-page">
    <main class="simple-inquiry-shell">
      <section class="simple-inquiry-card" id="quote" aria-labelledby="simple-inquiry-title">
        <div class="simple-inquiry-brand">
          <strong>RE:CAR</strong>
        </div>

        <div class="simple-inquiry-copy">
          <span>1분 간편 상담</span>
          <h1 id="simple-inquiry-title">안심할 수 있는<br />빠른견적</h1>
          <p>간편하게 원하시는 차종만 남겨주시면 24시간 안에 담당 어드바이저가 연락드립니다.</p>
        </div>

        <form
          class="quote-form simple-lead-form"
          data-default-campaign="inq-simple"
          data-default-lead-source="INQ 초간단 랜딩"
          data-default-campaign-label="차종 이름 연락처 간편 상담"
        >
          <div class="simple-step is-active" data-step="vehicle">
            <label>
              <span>STEP 01</span>
              희망 차종
              <input id="vehicleWish" name="vehicleWish" type="text" placeholder="예: 쏘렌토, GV80, Model Y" autocomplete="off" required />
            </label>
            <button class="simple-next-button" type="button" data-next-step="name">입력하기</button>
          </div>

          <div class="simple-step" data-step="name" hidden>
            <label>
              <span>STEP 02</span>
              이름
              <input id="customerName" name="customerName" type="text" autocomplete="name" placeholder="이름을 입력하세요" required />
            </label>
            <button class="simple-next-button" type="button" data-next-step="phone">연락처 입력하기</button>
          </div>

          <div class="simple-step" data-step="phone" hidden>
            <label>
              <span>STEP 03</span>
              연락처
              <input id="contactPhone" name="contactPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000" required />
            </label>
            <button class="simple-next-button" type="button" data-next-step="terms">약관 동의하기</button>
          </div>

          <div class="simple-step simple-terms-step" data-step="terms" hidden>
            <span class="simple-step-label">STEP 04</span>
            <strong>약관 동의</strong>
            <label class="simple-consent-row">
              <input id="privacyConsent" name="privacyConsent" type="checkbox" required />
              <span>개인정보 수집·이용에 동의합니다.</span>
            </label>
            <label class="simple-consent-row">
              <input id="termsConsent" name="termsConsent" type="checkbox" required />
              <span>상담 유의사항을 확인했습니다.</span>
            </label>
            <p>수집 항목: 차종, 이름, 연락처 / 이용 목적: 장기렌트·리스 견적 상담</p>
            <button class="submit-button simple-submit-button" type="submit">
              <span>상담 신청 완료</span>
            </button>
          </div>

          <p class="form-status" aria-live="polite" hidden>문의가 접수되었습니다. 가능한 조건을 확인해 연락드리겠습니다.</p>
        </form>
      </section>
    </main>

    <script src="../script.js?v=20260518-admincrm"></script>
    <script>
      (() => {
        const form = document.querySelector(".simple-lead-form");
        if (!form) return;

        const steps = [...form.querySelectorAll(".simple-step")];
        const stepMap = new Map(steps.map((step) => [step.dataset.step, step]));

        function revealStep(stepName) {
          const step = stepMap.get(stepName);
          if (!step) return;

          step.hidden = false;
          step.classList.add("is-active");
          step.scrollIntoView({ behavior: "smooth", block: "nearest" });

          window.setTimeout(() => {
            const field = step.querySelector("input:not([type='checkbox'])");
            field?.focus();
          }, 180);
        }

        function getStepField(step) {
          return step.querySelector("input:not([type='checkbox'])");
        }

        form.querySelectorAll("[data-next-step]").forEach((button) => {
          button.addEventListener("click", () => {
            const currentStep = button.closest(".simple-step");
            const field = getStepField(currentStep);

            if (field && !field.value.trim()) {
              field.focus();
              currentStep.classList.add("is-shaking");
              window.setTimeout(() => currentStep.classList.remove("is-shaking"), 320);
              return;
            }

            revealStep(button.dataset.nextStep);
          });
        });

        form.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;

          const step = event.target.closest(".simple-step");
          const button = step?.querySelector("[data-next-step]");
          if (!button) return;

          event.preventDefault();
          button.click();
        });
      })();
    </script>
  </body>
</html>
