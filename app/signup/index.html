<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RE:CAR 회원가입. 이메일, 휴대폰 번호, 비밀번호로 리카 계정을 만들고 내 차고와 견적 알림을 확인하세요."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RE:CAR" />
    <meta property="og:url" content="https://recarplan.com/app/signup/" />
    <meta property="og:title" content="RE:CAR 회원가입" />
    <meta property="og:description" content="리카 계정을 만들고 견적, 알림, 내 차고를 확인하세요." />
    <meta property="og:image" content="https://recarplan.com/assets/recar-og-20260518.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://recarplan.com/app/signup/" />
    <title>RE:CAR 회원가입</title>
    <link rel="icon" type="image/png" href="../../assets/recar-favicon-20260518.png" />
    <style>
      :root {
        color-scheme: light;
        --blue: #2563ff;
        --blue-dark: #0f3fd8;
        --ink: #101828;
        --muted: #667085;
        --line: #dbe4f0;
        --surface: #ffffff;
        --bg: #f4f7fb;
        --danger: #e5484d;
        --success: #0a8f52;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 0%, rgba(37, 99, 255, 0.13), transparent 32rem),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        color: var(--ink);
        font-family:
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .signup-shell {
        width: min(100%, 480px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 24px 20px 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .brand-mark {
        width: 10px;
        height: 28px;
        border-radius: 999px;
        background: var(--blue);
      }

      .login-link {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.75);
        color: #344054;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }

      .hero-copy {
        margin-bottom: 22px;
      }

      .eyebrow {
        display: inline-flex;
        margin-bottom: 12px;
        padding: 7px 11px;
        border-radius: 999px;
        background: #e8efff;
        color: var(--blue-dark);
        font-size: 12px;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 9vw, 46px);
        line-height: 1.08;
        letter-spacing: -0.06em;
      }

      .hero-copy p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.58;
        letter-spacing: -0.02em;
      }

      .signup-card {
        border: 1px solid rgba(165, 187, 224, 0.72);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 20px 48px rgba(28, 48, 86, 0.12);
        padding: 22px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }

      .field span {
        color: #344054;
        font-size: 14px;
        font-weight: 900;
      }

      input[type="email"],
      input[type="password"],
      input[type="tel"],
      input[type="text"] {
        width: 100%;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 16px;
        padding: 0 16px;
        outline: none;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(37, 99, 255, 0.13);
      }

      .consents {
        display: grid;
        gap: 12px;
        margin: 18px 0;
        padding: 16px;
        border-radius: 18px;
        background: #f8fbff;
      }

      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        color: #344054;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.45;
      }

      .check-row input {
        width: 20px;
        height: 20px;
        margin: 1px 0 0;
        accent-color: var(--blue);
      }

      .check-row small {
        display: block;
        margin-top: 2px;
        color: #98a2b3;
        font-size: 12px;
        font-weight: 700;
      }

      .terms-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--blue-dark);
        font-size: 13px;
        font-weight: 900;
      }

      .notice {
        margin: 0 0 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #eef4ff;
        color: #475467;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.55;
      }

      .submit {
        width: 100%;
        min-height: 58px;
        border: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--blue), #1d4ff5);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 17px;
        font-weight: 900;
        box-shadow: 0 12px 22px rgba(37, 99, 255, 0.24);
      }

      .submit:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 24px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.45;
      }

      .status.is-error {
        color: var(--danger);
      }

      .status.is-success {
        color: var(--success);
      }

      .done-panel {
        display: none;
        gap: 14px;
        text-align: center;
      }

      .done-panel.is-visible {
        display: grid;
      }

      .done-icon {
        width: 58px;
        height: 58px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 4px;
        border-radius: 20px;
        background: #e9f8f1;
        color: var(--success);
        font-size: 30px;
        font-weight: 900;
      }

      .done-panel h2 {
        margin: 0;
        font-size: 24px;
        letter-spacing: -0.05em;
      }

      .done-panel p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .done-actions {
        display: grid;
        gap: 10px;
        margin-top: 4px;
      }

      .done-actions a {
        display: flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        font-weight: 900;
        text-decoration: none;
      }

      .done-actions .primary {
        background: var(--blue);
        color: #fff;
      }

      .done-actions .secondary {
        border: 1px solid var(--line);
        background: #fff;
        color: #344054;
      }
    </style>
  </head>
  <body>
    <main class="signup-shell">
      <nav class="topbar" aria-label="상단 메뉴">
        <a class="brand" href="https://recarplan.com/" aria-label="RE:CAR 홈">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>RE:CAR</span>
        </a>
        <a class="login-link" href="/app/login/">로그인</a>
      </nav>

      <section class="hero-copy" aria-labelledby="signup-title">
        <span class="eyebrow">RE:CAR ACCOUNT</span>
        <h1 id="signup-title">리카 계정 만들기</h1>
        <p>견적 알림과 내 차고 진행 상태를 안전하게 확인할 수 있도록 계정을 만들어 주세요.</p>
      </section>

      <section class="signup-card">
        <form id="signupForm">
          <label class="field">
            <span>이메일</span>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required />
          </label>
          <label class="field">
            <span>휴대폰 번호</span>
            <input id="phone" name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="01012345678" required />
          </label>
          <label class="field">
            <span>이름 <small>(선택)</small></span>
            <input id="fullName" name="fullName" type="text" autocomplete="name" placeholder="이름을 입력하세요" />
          </label>
          <label class="field">
            <span>비밀번호</span>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" placeholder="8자 이상" required />
          </label>
          <label class="field">
            <span>비밀번호 확인</span>
            <input id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" minlength="8" placeholder="한 번 더 입력하세요" required />
          </label>
          <label class="field">
            <span>추천인 코드 <small>(선택)</small></span>
            <input id="referralCode" name="referralCode" type="text" autocomplete="off" placeholder="추천 코드가 있다면 입력" />
          </label>

          <div class="consents">
            <label class="check-row">
              <input id="termsAccepted" type="checkbox" required />
              <span>[필수] 이용약관에 동의합니다.<small>서비스 이용을 위해 필요합니다.</small></span>
            </label>
            <label class="check-row">
              <input id="privacyAccepted" type="checkbox" required />
              <span>[필수] 개인정보처리방침에 동의합니다.<small>회원 식별과 알림 제공을 위해 필요합니다.</small></span>
            </label>
            <label class="check-row">
              <input id="marketingAccepted" type="checkbox" />
              <span>[선택] 마케팅 정보 수신에 동의합니다.<small>선택 동의하지 않아도 가입할 수 있습니다.</small></span>
            </label>
            <div class="terms-links">
              <a href="/terms.html" target="_blank" rel="noopener">이용약관 보기</a>
              <a href="/privacy.html" target="_blank" rel="noopener">개인정보처리방침 보기</a>
            </div>
          </div>

          <p class="notice">회원가입만으로 금융사 심사나 신용조회가 시작되지 않습니다. 신청을 제출한 뒤 RE:CAR 담당자가 이용 가능한 조건을 확인해 안내합니다.</p>
          <button class="submit" type="submit">회원가입</button>
          <p id="status" class="status" aria-live="polite"></p>
        </form>

        <div id="donePanel" class="done-panel" aria-live="polite">
          <span class="done-icon">✓</span>
          <h2>회원가입이 완료됐어요</h2>
          <p>이제 로그인해서 내 차고와 견적 알림을 확인할 수 있습니다.</p>
          <div class="done-actions">
            <a class="primary" href="/app/login/">로그인하러 가기</a>
            <a class="secondary" href="/app/">앱 홈으로 이동</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const API_BASE_URL = "https://api.recarplan.com";
        const form = document.getElementById("signupForm");
        const status = document.getElementById("status");
        const donePanel = document.getElementById("donePanel");
        const submit = form.querySelector(".submit");

        const setStatus = (message, type = "") => {
          status.textContent = message;
          status.className = `status${type ? ` is-${type}` : ""}`;
        };

        const normalizePhone = (value) => value.replace(/[^0-9]/g, "");

        const getErrorMessage = async (response) => {
          try {
            const data = await response.json();
            if (typeof data.detail === "string") return data.detail;
            if (typeof data.message === "string") return data.message;
            if (data.detail && Array.isArray(data.detail)) return "입력값을 다시 확인해 주세요.";
          } catch (_) {}
          return "회원가입에 실패했습니다. 잠시 후 다시 시도해 주세요.";
        };

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const email = document.getElementById("email").value.trim();
          const phone = normalizePhone(document.getElementById("phone").value);
          const fullName = document.getElementById("fullName").value.trim();
          const password = document.getElementById("password").value;
          const passwordConfirm = document.getElementById("passwordConfirm").value;
          const referralCode = document.getElementById("referralCode").value.trim().toUpperCase();
          const termsAccepted = document.getElementById("termsAccepted").checked;
          const privacyAccepted = document.getElementById("privacyAccepted").checked;
          const marketingAccepted = document.getElementById("marketingAccepted").checked;

          if (!email || !phone || !password || !passwordConfirm) {
            setStatus("필수 정보를 입력해 주세요.", "error");
            return;
          }
          if (!/^01[016789][0-9]{7,8}$/.test(phone)) {
            setStatus("휴대폰 번호를 다시 확인해 주세요.", "error");
            return;
          }
          if (password.length < 8) {
            setStatus("비밀번호는 8자 이상으로 입력해 주세요.", "error");
            return;
          }
          if (password !== passwordConfirm) {
            setStatus("비밀번호가 서로 일치하지 않습니다.", "error");
            return;
          }
          if (!termsAccepted || !privacyAccepted) {
            setStatus("필수 약관에 동의해 주세요.", "error");
            return;
          }

          submit.disabled = true;
          setStatus("회원가입을 처리하고 있습니다.");

          try {
            const response = await fetch(`${API_BASE_URL}/api/v1/users/signup`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email,
                password,
                phone_number: phone,
                ...(fullName ? { full_name: fullName } : {}),
                ...(referralCode ? { referral_code: referralCode } : {}),
                marketing_agreed: marketingAccepted,
                terms_version: "web-2026-07-02",
                privacy_version: "web-2026-07-02",
              }),
            });

            if (!response.ok) {
              throw new Error(await getErrorMessage(response));
            }

            form.hidden = true;
            donePanel.classList.add("is-visible");
          } catch (error) {
            setStatus(error.message || "회원가입에 실패했습니다. 잠시 후 다시 시도해 주세요.", "error");
          } finally {
            submit.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
