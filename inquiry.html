<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RE:CAR 장기렌트 문의</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --bg-color: #000000; 
            --primary-color: #1a5099; 
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            -webkit-tap-highlight-color: transparent; /* 터치 시 파란 박스 제거 */
            touch-action: manipulation; /* 터치 반응 속도 개선 */
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            /* 모바일에서 키보드 올라와도 배경 안 찌그러지게 설정 */
            min-height: 100vh;
            /* 100dvh는 모바일 브라우저 주소창 대응 */
            min-height: 100dvh; 
            overflow-x: hidden; /* 가로 스크롤 방지 */
            overflow-y: auto;   /* 세로 스크롤 허용 (키보드 대응) */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 배경 이미지 최적화 (GPU 가속) */
        #bgVideo {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            z-index: -2;
            transform: translateZ(0); /* 하드웨어 가속 강제 */
            will-change: transform;
        }
        
        .dark-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); 
            z-index: -1;
            transform: translateZ(0);
        }

        /* 헤더 스타일 */
        .app-header {
            position: fixed; /* 상단 고정 */
            top: 0; left: 0; width: 100%;
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            /* 배경 블러 제거 (모바일 성능 향상) */
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo-area img {
            height: 50px; /* 모바일 최적화 크기 */
            width: auto;
            cursor: pointer;
        }

        /* 메인 컨테이너 */
        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
            /* 키보드가 올라왔을 때 여백 확보 */
            padding-top: 80px; 
            padding-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.3;
            word-break: keep-all;
            /* 텍스트 렌더링 최적화 */
            text-rendering: optimizeLegibility;
        }
        
        @media (max-width: 380px) {
            h1 { font-size: 1.7rem; }
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 모바일 터치감 향상 */
            min-height: 56px; 
        }

        .option-btn:active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: scale(0.96);
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        
        .text-input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 16px; /* iOS 확대 방지 */
            outline: none;
            /* 입력 시 부드러운 전환 */
            transition: border-color 0.3s;
        }

        .text-input:focus {
            border-color: var(--primary-color);
            background: rgba(26, 80, 153, 0.15);
        }

        /* 애니메이션 최적화 */
        .step { 
            display: none; 
            /* 하드웨어 가속을 위한 속성 */
            backface-visibility: hidden;
            perspective: 1000px;
        }
        
        .step.active { 
            display: block; 
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes slideUpFade {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* 모달 최적화 */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px); /* 지원 기기만 블러 */
            -webkit-backdrop-filter: blur(5px);
            overflow-y: auto;
            /* 스크롤 관성 효과 (부드럽게) */
            -webkit-overflow-scrolling: touch; 
        }
        
        .modal-content {
            width: 90%;
            max-width: 600px;
            margin: 60px auto; /* 상단 여백 확보 */
            padding-bottom: 60px;
        }
        
        .brand-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        
        .brand-item {
            padding: 14px 0;
            border: 1px solid #444;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            color: #ddd;
            background: #1a1a1a;
            /* 터치 딜레이 제거 */
            touch-action: manipulation;
        }
        .brand-item:active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .close-btn {
            float: right;
            font-size: 32px;
            padding: 10px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <img id="bgVideo" src="background.jpg" alt="Background">
    <div class="dark-overlay"></div>
    
    <div class="app-header">
        <div class="logo-area">
             <img src="logo12.png" alt="RE:CAR Logo" onclick="location.href='index.html'">
        </div>
    </div>

    <div class="container" id="mainContainer">
        
        <div class="step active" id="step1">
            <span class="subtitle">01. BRAND</span>
            <h1>어떤 브랜드를<br>찾으시나요?</h1>
            <button class="option-btn" style="width: 100%; padding: 25px; margin-top: 20px; font-weight: bold; color: var(--primary-color); border: 1px solid var(--primary-color);" onclick="openBrandModal()">
                <span id="selectedBrandName">브랜드 선택하기 (터치)</span>
            </button>
        </div>

        <div class="step" id="step2">
            <span class="subtitle">02. MODEL</span>
            <h1>희망하시는 차종을<br>입력해주세요</h1>
            <div class="input-area">
                <input type="text" id="carModel" placeholder="예) 그랜저, E클래스 등" class="text-input" autocomplete="off">
            </div>
            <button class="option-btn" style="width: 100%; margin-top: 20px; background: var(--primary-color);" onclick="validateStep2()">다음</button>
        </div>

        <div class="step" id="step3">
            <span class="subtitle">03. PERIOD</span>
            <h1>이용 기간 선택</h1>
            <div class="options-grid">
                <button class="option-btn" onclick="nextStep('36개월')">36개월</button>
                <button class="option-btn" onclick="nextStep('48개월')">48개월</button>
                <button class="option-btn" onclick="nextStep('60개월')">60개월</button>
                <button class="option-btn" onclick="nextStep('상담필요')">상담필요</button>
            </div>
        </div>

        <div class="step" id="step4">
            <span class="subtitle">04. MILEAGE</span>
            <h1>연간 주행거리</h1>
            <div class="options-grid">
                <button class="option-btn" onclick="nextStep('1만km')">1만km</button>
                <button class="option-btn" onclick="nextStep('2만km')">2만km</button>
                <button class="option-btn" onclick="nextStep('3만km')">3만km</button>
                <button class="option-btn" onclick="nextStep('무제한')">무제한</button>
            </div>
        </div>

        <div class="step" id="step5">
            <span class="subtitle">05. DEPOSIT</span>
            <h1>초기 비용 설정</h1>
            <div class="options-grid">
                <button class="option-btn" onclick="nextStep('0% (무보증)')">무보증 0%</button>
                <button class="option-btn" onclick="nextStep('보증금 30%')">보증금 30%</button>
                <button class="option-btn" onclick="nextStep('선납금 30%')">선납금 30%</button>
                <button class="option-btn" onclick="nextStep('상담 후 결정')">상담 후 결정</button>
            </div>
        </div>
        
        <div class="step" id="step6">
            <span class="subtitle">06. CONTACT</span>
            <h1>견적 받으실 연락처</h1>
            <div class="input-area">
                <input type="text" id="userName" placeholder="이름" class="text-input" autocomplete="name">
                <input type="tel" id="userPhone" placeholder="전화번호 (- 없이 입력)" class="text-input" pattern="[0-9]*" inputmode="numeric" autocomplete="tel">
            </div>
            <div style="margin-top: 20px; text-align: left; font-size: 0.85rem; color: #ccc; display: flex; align-items: center;">
                <input type="checkbox" id="privacyConsent" style="width: 20px; height: 20px; margin-right: 10px;">
                <label for="privacyConsent">개인정보 수집 이용 동의 (필수)</label>
            </div>
            <button class="option-btn" style="width: 100%; margin-top: 20px; background: var(--primary-color);" onclick="validateStep6()">견적 요청하기</button>
        </div>

        <div class="step" id="step7">
            <h1 style="color:white; font-size: 2rem;">접수가 완료되었습니다.</h1>
            <p style="color:#aaa; margin-top:20px;">담당자가 확인 후 빠르게 연락드리겠습니다.</p>
            <button class="option-btn" style="width: 100%; margin-top: 40px;" onclick="location.href='index.html'">홈으로 이동</button>
        </div>
    </div>
    
    <div id="brandModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeBrandModal()">&times;</span>
            <h3 style="color:white; margin-bottom:15px; margin-left: 5px;">브랜드 선택</h3>
            
            <h4 style="color:#1a5099; text-align:left; margin-top:20px; margin-left: 5px;">국산차</h4>
            <div class="brand-list">
                <div class="brand-item" onclick="selectBrand('현대')">현대</div>
                <div class="brand-item" onclick="selectBrand('기아')">기아</div>
                <div class="brand-item" onclick="selectBrand('제네시스')">제네시스</div>
                <div class="brand-item" onclick="selectBrand('KG모빌리티')">KGM</div>
                <div class="brand-item" onclick="selectBrand('쉐보레')">쉐보레</div>
            </div>

            <h4 style="color:#1a5099; text-align:left; margin-top:20px; margin-left: 5px;">수입차</h4>
            <div class="brand-list">
                <div class="brand-item" onclick="selectBrand('벤츠')">벤츠</div>
                <div class="brand-item" onclick="selectBrand('BMW')">BMW</div>
                <div class="brand-item" onclick="selectBrand('아우디')">아우디</div>
                <div class="brand-item" onclick="selectBrand('포르쉐')">포르쉐</div>
                <div class="brand-item" onclick="selectBrand('볼보')">볼보</div>
                <div class="brand-item" onclick="selectBrand('테슬라')">테슬라</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCgWeeRm81zCKW583ixehm5Mnoeb-OWUj8",
          authDomain: "recar-e1755.firebaseapp.com",
          projectId: "recar-e1755",
          storageBucket: "recar-e1755.firebasestorage.app",
          messagingSenderId: "240375029918",
          appId: "1:240375029918:web:0d1078a31fd2dbf5971b8f",
          measurementId: "G-6K8GLNMBGS"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStep = 1;
        const userSelection = {};
        const brandModal = document.getElementById('brandModal');

        function openBrandModal() { 
            brandModal.style.display = 'block'; 
            document.body.style.overflow = 'hidden'; // 모달 열림 시 스크롤 방지
        }
        function closeBrandModal() { 
            brandModal.style.display = 'none'; 
            document.body.style.overflow = ''; // 스크롤 복구
        }
        
        function selectBrand(brand) {
            userSelection.brand = brand;
            document.getElementById('selectedBrandName').textContent = brand;
            closeBrandModal();
            // 약간의 딜레이 후 다음 단계로 (터치 피드백 보여주기 위함)
            setTimeout(() => nextStep(null), 100);
        }

        function validateStep2() {
            const val = document.getElementById('carModel').value;
            if(val.length < 1) return alert('차종을 입력해주세요.');
            userSelection.carModel = val;
            nextStep(null);
        }

        function validateStep6() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const chk = document.getElementById('privacyConsent').checked;
            
            if(name.length < 2) return alert('이름을 입력해주세요.');
            if(phone.length < 10) return alert('전화번호를 입력해주세요.');
            if(!chk) return alert('개인정보 동의가 필요합니다.');
            
            userSelection.name = name;
            userSelection.phone = phone;

            // 버튼 중복 클릭 방지
            const btn = document.querySelector('#step6 .option-btn');
            btn.textContent = '접수 중...';
            btn.disabled = true;

            db.collection("inquiries").add({
                ...userSelection,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'New'
            }).then(() => {
                nextStep(null);
            }).catch((err) => {
                alert('오류가 발생했습니다.');
                btn.textContent = '견적 요청하기';
                btn.disabled = false;
            });
        }

        function nextStep(val) {
            if(val) {
                if(currentStep === 3) userSelection.period = val;
                if(currentStep === 4) userSelection.mileage = val;
                if(currentStep === 5) userSelection.deposit = val;
            }
            
            const currentEl = document.getElementById('step'+currentStep);
            const nextEl = document.getElementById('step'+(currentStep+1));

            if(nextEl) {
                currentEl.classList.remove('active');
                currentStep++;
                nextEl.classList.add('active');
            }
        }
    </script>
</body>
</html>
