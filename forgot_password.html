<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>비밀번호 찾기 - 블봇 (BloBot)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f1729",
                        "background-light": "#f6f7f8",
                        "background-dark": "#14171e",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans KR", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(15, 23, 41, 0.08);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display text-slate-900 dark:text-slate-100">
    <!-- Top Navigation -->
    <header class="w-full px-6 py-4 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2 group cursor-pointer" onclick="location.href='index.html'">
            <div class="bg-primary text-white p-1.5 rounded-lg">
                <span class="material-symbols-outlined text-lg">smart_toy</span>
            </div>
            <span
                class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight text-primary dark:text-white">블봇</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-[440px]">
            <!-- Card -->
            <div
                class="glass-effect dark:bg-slate-900/50 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8 md:p-10">
                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-3 tracking-tight">비밀번호 찾기</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                        가입하신 이메일 주소를 입력하시면<br>비밀번호 재설정 링크를 보내드립니다.
                    </p>
                </div>

                <!-- Status Messages -->
                <div class="hidden mb-6 p-4 rounded-lg flex items-center gap-3 text-sm" id="statusMessage">
                    <span class="material-symbols-outlined text-[20px]" id="statusIcon">info</span>
                    <span id="statusText"></span>
                </div>

                <!-- Form -->
                <form class="space-y-6" onsubmit="return false;">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
                            for="email">이메일 주소</label>
                        <input
                            class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/10 focus:border-primary outline-none transition-all placeholder:text-slate-400"
                            id="email" placeholder="name@company.com" type="email" />
                    </div>
                    <button
                        class="w-full bg-primary hover:bg-slate-800 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-slate-200 dark:shadow-none transition-all flex items-center justify-center gap-2 active:scale-[0.98]"
                        id="resetBtn">
                        재설정 링크 보내기
                    </button>
                    <div class="text-center">
                        <a href="login.html"
                            class="text-sm font-medium text-slate-500 hover:text-primary transition-colors flex items-center justify-center gap-1">
                            <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                            로그인으로 돌아가기
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase_config.js"></script>

    <script>
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const resetBtn = document.getElementById('resetBtn');

        resetBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                showStatus('이메일을 입력해주세요.', 'error');
                return;
            }

            try {
                resetBtn.disabled = true;
                resetBtn.textContent = '처리 중...';

                await auth.sendPasswordResetEmail(email);

                showStatus('비밀번호 재설정 이메일이 발송되었습니다! 메일함을 확인해주세요.', 'success');
                document.getElementById('email').value = '';
            } catch (error) {
                console.error("Reset Error:", error);
                let msg = `오류가 발생했습니다: ${error.message}`;
                if (error.code === 'auth/user-not-found') msg = '해당 이메일로 가입된 계정을 찾을 수 없습니다.';
                if (error.code === 'auth/invalid-email') msg = '유효하지 않은 이메일 형식입니다.';
                showStatus(msg, 'error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = '재설정 링크 보내기';
            }
        });

        function showStatus(msg, type) {
            statusText.textContent = msg;
            statusMessage.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-100', 'bg-emerald-50', 'text-emerald-600', 'border-emerald-100');

            if (type === 'error') {
                statusMessage.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-100');
                statusIcon.textContent = 'error';
            } else {
                statusMessage.classList.add('bg-emerald-50', 'text-emerald-600', 'border', 'border-emerald-100');
                statusIcon.textContent = 'check_circle';
            }
            statusMessage.classList.remove('hidden');
        }
    </script>
</body>

</html>
